<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b29ced" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Futuristic X Design -->
  <g filter="url(#glow)">
    <path d="M20,20 L40,50 L20,80" fill="none" stroke="url(#purpleGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M80,20 L60,50 L80,80" fill="none" stroke="url(#purpleGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="50" cy="50" r="6" fill="#ffffff" />
  </g>
</svg>
