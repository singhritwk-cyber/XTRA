<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e152a" />
      <stop offset="70%" stop-color="#0b0813" />
      <stop offset="100%" stop-color="#050308" />
    </radialGradient>

    <!-- Metallic Gradient -->
    <linearGradient id="metallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f2b96" />
      <stop offset="50%" stop-color="#a8c0ff" />
      <stop offset="100%" stop-color="#3f2b96" />
    </linearGradient>

    <!-- Neon Glow Purple -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Neon Glow Cyan -->
    <linearGradient id="neonCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Outer Frame with Neon Gradient Ring -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGlow)" stroke="url(#neonPurple)" stroke-width="2" />
  
  <!-- Outer Cyber Dots/Details -->
  <circle cx="50" cy="8" r="1.5" fill="#d946ef" opacity="0.8" />
  <circle cx="50" cy="92" r="1.5" fill="#d946ef" opacity="0.8" />
  <circle cx="8" cy="50" r="1.5" fill="#06b6d4" opacity="0.8" />
  <circle cx="92" cy="50" r="1.5" fill="#06b6d4" opacity="0.8" />

  <!-- Outer Ring Glow -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="8 4" opacity="0.5" />

  <!-- Cybernetic Robot Face Structure -->
  <g id="robot-head">
    <!-- Neck -->
    <path d="M42,70 L58,70 L55,82 L45,82 Z" fill="#1e1a2e" stroke="#3f2b96" stroke-width="1.5" />
    <line x1="50" y1="72" x2="50" y2="80" stroke="#06b6d4" stroke-width="2" opacity="0.8" />

    <!-- Helmet Base / Cheekplates -->
    <path d="M26,50 Q24,68 40,74 L60,74 Q76,68 74,50 Q73,34 50,30 Q27,34 26,50 Z" fill="#130f22" stroke="url(#neonPurple)" stroke-width="2.5" />

    <!-- Glowing Cyber Side Ears/Antennae -->
    <!-- Left Antenna -->
    <path d="M24,42 L16,36 L18,32 L25,40 Z" fill="#1e1a2e" stroke="#8b5cf6" stroke-width="1.5" />
    <circle cx="16" cy="34" r="2.5" fill="#06b6d4" filter="url(#glowEffect)" />
    <!-- Right Antenna -->
    <path d="M76,42 L84,36 L82,32 L75,40 Z" fill="#1e1a2e" stroke="#8b5cf6" stroke-width="1.5" />
    <circle cx="84" cy="34" r="2.5" fill="#06b6d4" filter="url(#glowEffect)" />

    <!-- Sleek Glossy Visor -->
    <path d="M30,48 Q40,43 50,43 Q60,43 70,48 Q72,58 64,63 Q50,65 36,63 Q28,58 30,48 Z" fill="#07050d" stroke="url(#neonCyan)" stroke-width="2" />

    <!-- Glowing Neon Eyes inside Visor -->
    <g filter="url(#glowEffect)">
      <!-- Left Eye: Sleek Futuristic Wing/Dash -->
      <path d="M36,52 L45,55 L44,57 L37,54 Z" fill="#06b6d4" />
      <circle cx="44" cy="56" r="1.5" fill="#ffffff" />
      
      <!-- Right Eye: Sleek Futuristic Wing/Dash -->
      <path d="M64,52 L55,55 L56,57 L63,54 Z" fill="#06b6d4" />
      <circle cx="56" cy="56" r="1.5" fill="#ffffff" />
    </g>

    <!-- Forehead Plate -->
    <path d="M36,33 L64,33 L60,41 L40,41 Z" fill="#1c1630" stroke="#8b5cf6" stroke-width="1" />

    <!-- Futuristic Glowing "X" Logo on Forehead -->
    <g filter="url(#glowEffect)" opacity="0.95">
      <path d="M46,35 L54,39 M54,35 L46,39" stroke="#d946ef" stroke-width="2.5" stroke-linecap="round" />
      <circle cx="50" cy="37" r="1" fill="#ffffff" />
    </g>
    
    <!-- Mouth Vent / Audio Wave Lines -->
    <path d="M46,68 L54,68" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" opacity="0.7" />
    <path d="M48,70 L52,70" stroke="#06b6d4" stroke-width="1" stroke-linecap="round" opacity="0.9" />
  </g>
</svg>
